upstream lms_app {
  server app:3000;
}

server {
  listen 80;
  server_name lms.garpium.com www.lms.garpium.com;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name lms.garpium.com www.lms.garpium.com;

  ssl_certificate /etc/letsencrypt/live/lms.garpium.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/lms.garpium.com/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;

  client_max_body_size 20m;

  location / {
    proxy_pass http://lms_app;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
  }
}
